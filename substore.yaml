      filter: "(?i)(?=.*(香港|hongkong|hong kong|(^|[^A-Za-z])hk([^A-Za-z]|$)|(^|[^A-Za-z])hkg([^A-Za-z]|$)))(?=.*(流媒体|解锁|奈飞|netflix|影音)).*$",
