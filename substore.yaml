  apple:
    type: http
    behavior: classical
    path: ./rule-providers/apple.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml
    interval: 86400

  china:
    type: http
    behavior: classical
    path: ./rule-providers/china.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/China/China.yaml
    interval: 86400

  telegram:
    type: http
    behavior: classical
    path: ./rule-providers/telegram.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
    interval: 86400

  openai:
    type: http
    behavior: classical
    path: ./rule-providers/openai.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    interval: 86400

  global:
    type: http
    behavior: classical
    path: ./rule-providers/global.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global.yaml
    interval: 86400

rules:
  - RULE-SET,reject-custom,拒绝
  - RULE-SET,direct-custom,直连
  - RULE-SET,crypto,🪙 Crypto
  - RULE-SET,ads,拒绝
  - RULE-SET,apple,直连
  - RULE-SET,china,直连
  - RULE-SET,telegram,📲 Telegram
  - RULE-SET,openai,🤖 AI
  - RULE-SET,global,🚀 默认代理
  - GEOIP,CN,直连
  - MATCH,🐟 漏网之鱼
