# DNS防泄露版本
# 必读！！！
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。
# 机场订阅
proxy-providers:
  airport:
    url: "机场订阅填到这里，两端引号不要去掉，不要填写到下方链接里去！！"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# 节点信息
proxies:
  - { name: 直连, type: direct }
  - { name: 拒绝, type: reject }

# 全局配置
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24

# 出站策略
# 这一版按“服务固定地区”来分：
# 1. AI / crypto 默认走台湾非流媒体
# 2. 其他服务优先固定在单一区域，减少账号地区来回变化
# 3. 需要更细时，只改地区组，不用每个服务单独改一遍
proxy-groups:
  - {
      name: 🚀 默认代理,
      type: select,
      proxies: [🇹🇼 台湾家宽, 🇹🇼 台湾流媒体, ♻️ 台湾家宽, ♻️ 台湾流媒体, 🌐 全部节点, 直连],
    }
  - { name: 🤖 AI, type: select, proxies: [🇹🇼 台湾家宽, 🌐 全部节点] }
  - { name: 🪙 Crypto, type: select, proxies: [🇹🇼 台湾家宽, 🌐 全部节点] }
  - { name: 🍀 Google, type: select, proxies: [🇹🇼 台湾家宽, 🌐 全部节点, 直连] }
  - { name: 👨🏿‍💻 GitHub, type: select, proxies: [🇹🇼 台湾家宽, 🌐 全部节点, 直连] }
  - { name: 🎵 TikTok, type: select, proxies: [🇹🇼 台湾家宽, 🌐 全部节点, 直连] }
  - { name: 📲 Telegram, type: select, proxies: [🇹🇼 台湾家宽, 🌐 全部节点, 直连] }
  - { name: 📹 YouTube, type: select, proxies: [🇹🇼 台湾流媒体, 🌐 全部节点, 直连] }
  - { name: 🎥 NETFLIX, type: select, proxies: [🇹🇼 台湾流媒体, 🌐 全部节点, 直连] }
  - { name: 🐟 漏网之鱼, type: select, proxies: [🇹🇼 台湾家宽, 🌐 全部节点, 直连] }
  - { name: 🇹🇼 台湾家宽, type: select, include-all: true, filter: "(?=.*(台湾|台|TW|Taiwan))^((?!(流媒体)).)*$" }
  - { name: 🇹🇼 台湾流媒体, type: select, include-all: true, filter: "(?=.*(台湾|台|TW|Taiwan))(?=.*流媒体).*$" }

  - {
      name: ♻️ 台湾家宽,
      type: url-test,
      include-all: true,
      url: "https://www.gstatic.com/generate_204",
      tolerance: 20,
      interval: 300,
      filter: "(?=.*(台湾|台|TW|Taiwan))^((?!(流媒体)).)*$",
    }
  - {
      name: ♻️ 台湾流媒体,
      type: url-test,
      include-all: true,
      url: "https://www.gstatic.com/generate_204",
      tolerance: 20,
      interval: 300,
      filter: "(?=.*(台湾|台|TW|Taiwan))(?=.*流媒体).*$",
    }
  - { name: 🌐 全部节点, type: select, include-all: true }

rule-providers:
  reject-custom:
    type: http
    behavior: classical
    path: ./rule-providers/reject-custom.list
    url: https://raw.githubusercontent.com/hi-bingo/cc-rules/main/rules/reject.list
    interval: 86400

  direct-custom:
    type: http
    behavior: classical
    path: ./rule-providers/direct-custom.list
    url: https://raw.githubusercontent.com/hi-bingo/cc-rules/main/rules/direct.list
    interval: 86400

  crypto:
    type: http
    behavior: classical
    path: ./rule-providers/crypto.list
    url: https://raw.githubusercontent.com/hi-bingo/cc-rules/main/rules/crypto.list
    interval: 86400

  ads:
    type: http
    behavior: classical
    path: ./rule-providers/ads.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising.yaml
