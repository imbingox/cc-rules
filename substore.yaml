# 节点信息
# DIRECT / REJECT 使用内置策略，无需在 proxies 中重复定义

# 基础配置
port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
dns:
  enable: true
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
  fallback:
    - 8.8.8.8
    - 8.8.4.4
    - tls://1.0.0.1:853
    - tls://dns.google:853
proxies: ~

# 出站策略
# 这一版按“地区-功能”来分：
# 1. 非流媒体服务默认走“地区-家宽”
# 2. 流媒体服务默认走“地区-流媒体”，并优先使用自动测速组
# 3. 未命中家宽/流媒体标签的节点归到“地区-其他”
# 4. 节点名含 `-` 时，优先按最后一个 `-` 后面的地区名归组
proxy-groups:
  - {
      name: 🚀 默认代理,
      type: select,
      proxies: [🇨🇳 台湾-家宽, 🇭🇰 香港-家宽, 🇯🇵 日本-家宽, 🇸🇬 新加坡-家宽, 🇺🇸 美国-家宽, 🌐 全部节点, DIRECT],
    }
  - { name: 🤖 AI, type: select, proxies: [🇨🇳 台湾-家宽, 🇭🇰 香港-家宽, 🇯🇵 日本-家宽, 🇸🇬 新加坡-家宽, 🇺🇸 美国-家宽, 🌐 全部节点] }
  - { name: 🪙 Crypto, type: select, proxies: [🇨🇳 台湾-家宽, 🇭🇰 香港-家宽, 🇯🇵 日本-家宽, 🇸🇬 新加坡-家宽, 🇺🇸 美国-家宽, 🌐 全部节点] }
  - { name: 🍀 Google, type: select, proxies: [🇨🇳 台湾-家宽, 🇭🇰 香港-家宽, 🇯🇵 日本-家宽, 🇸🇬 新加坡-家宽, 🇺🇸 美国-家宽, 🌐 全部节点, DIRECT] }
  - { name: 👨🏿‍💻 GitHub, type: select, proxies: [🇨🇳 台湾-家宽, 🇭🇰 香港-家宽, 🇯🇵 日本-家宽, 🇸🇬 新加坡-家宽, 🇺🇸 美国-家宽, 🌐 全部节点, DIRECT] }
  - { name: 🎵 TikTok, type: select, proxies: [🇨🇳 台湾-家宽, 🇭🇰 香港-家宽, 🇯🇵 日本-家宽, 🇸🇬 新加坡-家宽, 🇺🇸 美国-家宽, 🌐 全部节点, DIRECT] }
  - { name: 📲 Telegram, type: select, proxies: [🇨🇳 台湾-家宽, 🇭🇰 香港-家宽, 🇯🇵 日本-家宽, 🇸🇬 新加坡-家宽, 🇺🇸 美国-家宽, 🌐 全部节点, DIRECT] }
  - { name: 🎬 流媒体, type: select, proxies: [🇨🇳 台湾-流媒体, 🇭🇰 香港-流媒体, 🇯🇵 日本-流媒体, 🇸🇬 新加坡-流媒体, 🇺🇸 美国-流媒体, 🌐 全部节点, DIRECT] }
  - { name: 🐟 漏网之鱼, type: select, proxies: [🇨🇳 台湾-家宽, 🇭🇰 香港-家宽, 🇯🇵 日本-家宽, 🇸🇬 新加坡-家宽, 🇺🇸 美国-家宽, 🌐 全部节点, DIRECT] }

  - {
      name: 🇨🇳 台湾-家宽,
      type: fallback,
      include-all: true,
      url: "https://www.gstatic.com/generate_204",
      interval: 300,
      filter: "(?i)(?=.*(台湾|台|taiwan|(^|[^A-Za-z])tw([^A-Za-z]|$)))(?=.*(家宽|宽带|住宅|家庭)).*$",
      exclude-filter: "(?i)^.*-[^-]*(香港|hong kong|hongkong|日本|japan|新加坡|singapore|美国|united states|unitedstates|america)[^-]*$",
    }
  - {
      name: 🇨🇳 台湾-流媒体,
      type: url-test,
      include-all: true,
      url: "https://www.gstatic.com/generate_204",
      tolerance: 20,
      interval: 300,
      filter: "(?i)(?=.*(台湾|台|taiwan|(^|[^A-Za-z])tw([^A-Za-z]|$)))(?=.*(流媒体|解锁|奈飞|netflix|影音)).*$",
      exclude-filter: "(?i)^.*-[^-]*(香港|hong kong|hongkong|日本|japan|新加坡|singapore|美国|united states|unitedstates|america)[^-]*$",
    }
  - {
      name: 🇨🇳 台湾-其他,
      type: select,
      include-all: true,
      filter: "(?i)(?=.*(台湾|台|taiwan|(^|[^A-Za-z])tw([^A-Za-z]|$)))^((?!(家宽|宽带|住宅|家庭|流媒体|解锁|奈飞|netflix|影音)).)*$",
      exclude-filter: "(?i)^.*-[^-]*(香港|hong kong|hongkong|日本|japan|新加坡|singapore|美国|united states|unitedstates|america)[^-]*$",
    }
  - {
      name: 🇭🇰 香港-家宽,
      type: fallback,
      include-all: true,
      url: "https://www.gstatic.com/generate_204",
      interval: 300,
      filter: "(?i)(?=.*(香港|hongkong|hong kong|(^|[^A-Za-z])hk([^A-Za-z]|$)|(^|[^A-Za-z])hkg([^A-Za-z]|$)))(?=.*(家宽|宽带|住宅|家庭)).*$",
      exclude-filter: "(?i)^.*-[^-]*(台湾|台|taiwan|日本|japan|新加坡|singapore|美国|united states|unitedstates|america)[^-]*$",
    }
  - {
