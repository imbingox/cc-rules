# Pure rules template for Clash.
# Merge `rule-providers` and `rules` into your main config.
# Your main config should already define a proxy group named `PROXY`.

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  nameserver:
    - 223.5.5.5
    - 114.114.114.114
    - 119.29.29.29
    - 180.76.76.76
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - router.asus.com
    - localhost.sec.qq.com
    - localhost.ptlogin2.qq.com
    - +.msftconnecttest.com
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - 114.114.114.114
    - 180.76.76.76
    - 119.29.29.29
    - 223.5.5.5
    - 8.8.8.8
    - 8.8.4.4
    - 1.1.1.1
    - 1.0.0.1
  
proxies:
  - name: PROXY
    type: vless
    server: 
    port: 
    uuid: 
    servername: 
    tls: true
    flow: xtls-rprx-vision
    client-fingerprint: chrome
    reality-opts:
      public-key: 
      short-id: 

rule-providers:
  reject-custom:
    type: http
    behavior: classical
    path: ./rule-providers/reject-custom.list
    url: https://raw.githubusercontent.com/hi-bingo/cc-rules/main/rules/reject.list
    interval: 86400

  direct-custom:
    type: http
    behavior: classical
    path: ./rule-providers/direct-custom.list
    url: https://raw.githubusercontent.com/hi-bingo/cc-rules/main/rules/direct.list
    interval: 86400

  crypto:
    type: http
    behavior: classical
    path: ./rule-providers/crypto.list
    url: https://raw.githubusercontent.com/hi-bingo/cc-rules/main/rules/crypto.list
    interval: 86400

  stocks:
    type: http
    behavior: classical
    path: ./rule-providers/stocks.list
    url: https://raw.githubusercontent.com/hi-bingo/cc-rules/main/rules/stocks.list
    interval: 86400

  ads:
    type: http
    behavior: classical
    path: ./rule-providers/ads.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising.yaml
    interval: 86400

  apple:
    type: http
    behavior: classical
    path: ./rule-providers/apple.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml
    interval: 86400

  china:
    type: http
    behavior: classical
    path: ./rule-providers/china.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/China/China.yaml
    interval: 86400

  telegram:
    type: http
    behavior: classical
    path: ./rule-providers/telegram.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
    interval: 86400

  openai:
    type: http
    behavior: classical
    path: ./rule-providers/openai.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    interval: 86400

  global:
    type: http
    behavior: classical
    path: ./rule-providers/global.yaml
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global.yaml
    interval: 86400

rules:
  - RULE-SET,reject-custom,REJECT
  - RULE-SET,direct-custom,DIRECT
  - RULE-SET,crypto,PROXY
  - RULE-SET,stocks,DIRECT
  - RULE-SET,ads,REJECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,china,DIRECT
  - RULE-SET,telegram,PROXY
  - RULE-SET,openai,PROXY
  - RULE-SET,global,PROXY
  - GEOIP,CN,DIRECT
  - MATCH,PROXY
